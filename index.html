<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPIS360 WebAR</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">

      <a-box
        position="0 0.5 0"
        color="#e76f51"
        depth="0.5"
        height="0.5"
        width="0.5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>

      <a-sphere
        position="0.8 0.5 0"
        radius="0.25"
        color="#3a86ff">
      </a-sphere>

      <a-cylinder
        position="-0.8 0.5 0"
        radius="0.2"
        height="0.6"
        color="#2a9d8f">
      </a-cylinder>

     <a-text
       value="Faisal Alhimiye"
       position="0 0.2 0.5"
       align="center"
       color="#ffff00"
       width="5">
     </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
