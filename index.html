<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPIS360 WebAR</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-marker preset="hiro">

      <a-box
        position="0 0.45 0"
        color="#e76f51"
        depth="0.45"
        height="0.45"
        width="0.45"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>

      <a-sphere
        position="0.9 0.4 0"
        radius="0.22"
        color="#3a86ff">
      </a-sphere>

      <a-cylinder
        position="-0.9 0.4 0"
        radius="0.18"
        height="0.55"
        rotation="0 0 90"
        color="#2a9d8f">
      </a-cylinder>

      <a-text
        value="Faisal Alhimiye"
        position="0 0.95 0"
        rotation="-90 0 0"
        align="center"
        color="#FFD60A"
        width="4"
        side="double">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
