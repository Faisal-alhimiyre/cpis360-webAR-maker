<!DOCTYPE html>
<html>
<head>
  <title>WebAR Maker App</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs>

    <!-- Hiro Marker -->
    <a-marker preset="hiro">

      <!-- Box -->
      <a-box 
        position="0 0.5 0" 
        color="red" 
        scale="1 1 1"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>

      <!-- Sphere -->
      <a-sphere 
        position="1 0.5 0" 
        radius="0.3" 
        color="blue">
      </a-sphere>

      <!-- Cylinder -->
      <a-cylinder 
        position="-1 0.5 0" 
        radius="0.3" 
        height="1" 
        color="green">
      </a-cylinder>

      <!-- Your Name -->
      <a-text 
        value="Faisal Fahad Alhimiyre" 
        position="-1 1.5 0" 
        color="black" 
        scale="1 1 1">
      </a-text>

    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
